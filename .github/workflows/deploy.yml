name: Deploy to Beget (static v2)

# v2 — плоская статика (без Astro-сборки). Только ручной запуск.
# Заливка ./site/ по FTPS. Пред-шаг стирает remote sync-state, чтобы заливка была
# ЧИСТО ДОБАВЛЯЮЩЕЙ (v1-осиротевшие файлы не удаляются автоматически — чистим отдельным workflow).
on:
  workflow_dispatch:

concurrency:
  group: deploy-beget
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear remote sync-state (additive deploy)
        env:
          S: ${{ secrets.FTP_SERVER }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          D: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; open -u \"$U\",\"$P\" \"$S\"; rm -f \"$D/.ftp-deploy-sync-state.json\"" || true

      - name: Deploy static site to Beget via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/lead-config.php
            **/.git*
            **/.ftp-deploy-sync-state.json
