name: Deploy to Beget

# Автодеплой: push в main -> сборка Astro -> заливка dist/ по FTPS в Beget.
# Ручной запуск — вкладка Actions -> Run workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-beget
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (strip-config чистит секреты из dist)
        run: npm run build

      - name: Deploy to Beget via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # Содержимое dist/ -> в docroot домена.
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # НЕ трогать серверный конфиг с секретами почты/Telegram и служебные файлы.
          # Исключённые пути не заливаются И не удаляются с сервера.
          exclude: |
            **/lead-config.php
            **/.git*
            **/node_modules/**
            **/.htpasswd
