name: Deploy to Beget (static v2)

# v2 — плоская статика (без Astro-сборки). Только ручной запуск (Actions -> Run workflow),
# чтобы контролировать момент боевого выката. Заливка dist-каталога ./site/ по FTPS.
on:
  workflow_dispatch:

concurrency:
  group: deploy-beget
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site to Beget via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Неразрушающая заливка: v1-осиротевшие файлы НЕ удаляются (чистим руками после).
          dangerous-clean-slate: false
          # Секреты формы и служебное на сервере не трогаем.
          exclude: |
            **/lead-config.php
            **/.git*
            **/.ftp-deploy-sync-state.json
